# 워크플로우의 이름
name: Deploy to EC2

# dev-master 브랜치에 push 될 때 실행
on:
  push:
    branches:
      - dev-master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            # --- 배포 스크립트 시작 ---

            # 1. 변수 설정 (분리된 경로 구조)
            SOURCE_DIR="/home/ec2-user/back"
            APP_DIR="/home/ec2-user/deploy"
            RELEASES_DIR="$APP_DIR/releases"
            CURRENT_SYMLINK="$APP_DIR/current"
            NEW_RELEASE_DIR="$RELEASES_DIR/$(date +%Y%m%d%H%M%S)"

            # GitHub 저장소 주소 (SSH 방식)
            REPO_URL="https://github.com/onemasol/back.git"

            echo ">>> 1. Cloning latest code into a new release directory..."
            # 기존의 git pull & cp 대신, 새 릴리즈 폴더로 직접 git clone을 실행
            git clone --depth 1 --branch dev-master $REPO_URL "$NEW_RELEASE_DIR"
            cd "$NEW_RELEASE_DIR"

            echo ">>> 2. Setting up Python environment..."
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            pip install gunicorn

            echo ">>> 3. Creating .env file..."
            # .env 파일 생성
            echo "DB_URL=${{ secrets.DB_URL }}" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "CLOVA_OCR_APIGW_URL=${{ secrets.CLOVA_OCR_APIGW_URL }}" >> .env 
            echo "CLOVA_OCR_SECRET_KEY=${{ secrets.CLOVA_OCR_SECRET_KEY }}" >> .env
            echo "GOOGLE_ALLOWED_CLIENT_IDS=${{ secrets.GOOGLE_ALLOWED_CLIENT_IDS }}" >> .env

            echo ">>> 4. Switching symbolic link to new release..."
            # 심볼릭 링크를 새로운 릴리즈 폴더로 변경
            ln -sfn "$NEW_RELEASE_DIR" "$CURRENT_SYMLINK"

            echo ">>> 5. Restarting application service..."
            # Systemd 서비스 재시작
            sudo systemctl restart onemasol

            echo "🚀 Deployment successful to $NEW_RELEASE_DIR"